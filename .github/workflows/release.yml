name: Build & Release Herobrine Plugin

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package --batch-mode

      - name: Get Release Tag / Version
        id: vars
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${github.ref#refs/tags/}"
          else
            TAG_NAME="v1.0.0-${GITHUB_SHA::7}"
          fi
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT

      - name: Create / Update GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: ${{ steps.vars.outputs.tag_name }}
          name: Herobrine Plugin ${{ steps.vars.outputs.tag_name }}
          body: |
            ## Release Automático - Plugin Herobrine
            - Compilado com Java 21 para Paper/Spigot 1.20.x e 1.21.x.
            - Commit: `${{ github.sha }}`
          draft: false
          prerelease: false
          files: |
            target/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
